manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: sekigon-gonnoc
      url-base: https://github.com/sekigon-gonnoc
    - name: Olson3R
      url-base: https://github.com/Olson3R
  projects:
    - name: zephyr
      remote: zmkfirmware
      revision: v3.5.0+zmk-fixes
      clone-depth: 1
      import:
        name-blocklist:
          - ci-tools
          - hal_altera
          - hal_cypress
          - hal_infineon
          - hal_microchip
          - hal_nxp
          - hal_openisa
          - hal_silabs
          - hal_xtensa
          - hal_st
          - hal_ti
          - loramac-node
          - mcuboot
          - mcumgr
          - net-tools
          - openthread
          - edtt
          - trusted-firmware-m
    - name: nanopb
      revision: 8c60555d6277a0360c876bd85d491fc4fb0cd74a
      path: modules/lib/nanopb
      remote: zmkfirmware
    - name: zmk-studio-messages
      revision: 6cb4c283e76209d59c45fbcb218800cd19e9339d
      path: modules/msgs/zmk-studio-messages
      remote: zmkfirmware
    # Pico-PIO-USB upstream (sekigon-gonnoc/Pico-PIO-USB) — bit-banged USB
    # PHY+controller for RP2040. Phase 2 of the Lemon Wired ZMK roadmap
    # uses it as the inter-half link on the second USB-C port.
    - name: Pico-PIO-USB
      remote: sekigon-gonnoc
      # Post-0.7.2 main: includes 38ed543 "optimize to reduce delay
      # between received DATA and sending handshake" — inlines
      # pio_usb_bus_send_handshake and caches PIO/SM/rx_buffer in
      # locals to tighten the DATA→ACK turnaround. Without this, our
      # IN STATUS for SET_ADDRESS appears to ACK on the host side but
      # the device misses our ACK (timing-critical, must arrive within
      # 6.5–7.5 bit-times of EOP) and never commits the new address.
      revision: 675543bcc9baa8170f868ab7ba316d418dbcf41f # main @ post-0.7.2
      path: modules/lib/pico-pio-usb
    # Zephyr glue exposing Pico-PIO-USB as UHC + UDC drivers.
    # Pinned at the cleanup of the B4 working state (single-xfer
    # control transfers + per-tick xfer pumping + STATUS direction
    # fix); see the phase-2-samples branch for context.
    - name: zephyr-module-pio-usb
      remote: Olson3R
      revision: v0.1.0
      path: modules/lib/zephyr-pio-usb
  self:
    west-commands: scripts/west-commands.yml
