# SPDX-License-Identifier: MIT
#
# Peripheral side: CDC ACM on native USB-C exposes the split protocol
# bulk endpoints that the central's PIO-USB UHC enumerates.

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Lemon Wired (peripheral)"
CONFIG_USB_DEVICE_PID=0x0013
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_CDC_ACM=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Zephyr 3.5 RP2040 flash driver is broken in this fork — non-persistent
# settings until that lands. Board defconfig sets these to y; we override.
CONFIG_FLASH=n
CONFIG_NVS=n
CONFIG_SETTINGS=n

CONFIG_ZMK_EXT_POWER=n
