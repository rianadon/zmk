# SPDX-License-Identifier: MIT
#
# Central side: ZMK HID output + PIO-USB split link.
# Native USB-C carries HID (via ZMK_USB) and an optional CDC ACM console.

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Lemon Wired"
CONFIG_USB_DEVICE_VID=0x1d50
CONFIG_USB_DEVICE_PID=0x0012
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Zephyr 3.5 RP2040 flash driver is broken in this fork — non-persistent
# settings until that lands. Board defconfig sets these to y; we override.
CONFIG_FLASH=n
CONFIG_NVS=n
CONFIG_SETTINGS=n

CONFIG_ZMK_USB=y
CONFIG_ZMK_EXT_POWER=n
