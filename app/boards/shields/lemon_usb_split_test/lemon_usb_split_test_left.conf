# SPDX-License-Identifier: MIT
#
# Central-side test config — adds the legacy USB device stack + CDC ACM
# serial console on the Lemon Wired's native USB-C port. The PIO-USB
# UHC on Link is already configured by Kconfig.defaults.

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Lemon USB Split Central"
CONFIG_USB_DEVICE_PID=0x0010
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USB_DRIVER_LOG_LEVEL_INF=y
CONFIG_USB_DEVICE_LOG_LEVEL_INF=y

# Drop the broken flash driver in this Zephyr.
CONFIG_FLASH=n
CONFIG_NVS=n
CONFIG_SETTINGS=n
