# SPDX-License-Identifier: MIT
#
# Peripheral side (native UDC variant): legacy USB device stack on
# native USB-C, exposed as CDC ACM. Lemon A's UHC enumerates and
# uses the data-interface bulk pair (0x02 OUT / 0x82 IN).
#
# We don't enable a separate CDC ACM debug console — having two CDC
# ACMs in the build would shift our split-protocol endpoints and the
# central wouldn't know which CDC ACM to talk to. Debugging happens
# through the central's serial console.

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Lemon USB Split Peripheral"
CONFIG_USB_DEVICE_PID=0x0011
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_CDC_ACM=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_FLASH=n
CONFIG_NVS=n
CONFIG_SETTINGS=n
